name: Gallery Date Parser Redux
# requires: PythonDepManager
description: Find date in path or filename and add it to the gallery
version: 1.3.1
url: https://discourse.stashapp.cc/t/gallery-date-parser/1330
exec:
  - python
  - "{pluginDir}/date_parser.py"
interface: raw
tasks:
  - name: Find gallery dates
    description: Add the date on galleries based on their path
    defaultArgs:
      mode: gallery
  - name: Find image dates
    description: Add the date on images based on their path
    defaultArgs:
      mode: image
  - name: Find scene dates
    description: Add the date on scenes based on their path
    defaultArgs:
      mode: scene
settings:
  setTitle:
    displayName: Set title ?
    description: Set title from folder name minus the found date ? Only applies on galleries without titles
    type: BOOLEAN
  simplifiedPattern:
    displayName: Use Simplified Pattern?
    description: Use simpler pattern (only matches YYYY-MM-DD) instead of full pattern
    type: BOOLEAN

  dryRun:
    displayName: Dry Run
    description: Run without modifying database
    type: BOOLEAN
